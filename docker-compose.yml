services:
  insight:
    build: .
    container_name: insight
    restart: unless-stopped
    environment:
      - PORT=3001
      - INSIGHT_PASSWORD_HASH=${INSIGHT_PASSWORD_HASH}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - insight_data:/app/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - insight

volumes:
  insight_data:
  caddy_data:
  caddy_config:
