# fly.toml — https://fly.io/docs/reference/configuration/

app = "insight"
primary_region = "yul"  # Montreal

[build]

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "insight_data"
  destination = "/app/data"
