app = 'insight-icy-surf-6665'
primary_region = 'yyz'

[build]

[env]
  PORT = '3001'

[[mounts]]
  source = 'insight_data'
  destination = '/app/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
